<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">

  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <main>
    <div class="wrapper">
      <img class="profile-picture" src="assets/images/avatar-jessica.jpeg" alt="profile picture">
    </div>
    <h1>Jessica Randall</h1>
    <h2>London, United Kingdom</h2>
    <p>"Front-end developer and avid reader."</p>
    
    <div class="links">
      <a class="social-link">GitHub</a>
      <a class="social-link">Frontend Mentor</a>
      <a class="social-link">LinkedIn</a>
      <a class="social-link">Twitter</a>
      <a class="social-link">Instagram</a>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#" target="_blank">Your Name Here</a>.
  </footer>
</body>
</html>
